<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — ShopBR Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Sidebar -->
    <div class="flex min-h-screen">
        <aside class="w-64 bg-gray-900 text-white flex flex-col fixed h-full">
            <div class="px-6 py-5 border-b border-gray-700">
                <h1 class="text-xl font-bold text-white">ShopBR</h1>
                <p class="text-xs text-gray-400 mt-1">Painel Administrativo</p>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="{% url 'dashboard_index' %}"
                   class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium
                          {% if request.resolver_match.url_name == 'dashboard_index' %}bg-blue-600 text-white{% else %}text-gray-300 hover:bg-gray-800{% endif %}">
                    <i class="fa-solid fa-chart-line w-4"></i>
                    Dashboard
                </a>
                <a href="{% url 'dashboard_product_list' %}"
                   class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium
                          {% if 'product' in request.resolver_match.url_name %}bg-blue-600 text-white{% else %}text-gray-300 hover:bg-gray-800{% endif %}">
                    <i class="fa-solid fa-box w-4"></i>
                    Produtos
                </a>
                <a href="{% url 'dashboard_product_create' %}"
                   class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-300 hover:bg-gray-800">
                    <i class="fa-solid fa-plus w-4"></i>
                    Novo Produto
                </a>
            </nav>

            <div class="px-4 py-4 border-t border-gray-700">
                <p class="text-xs text-gray-400 mb-2">{{ request.user.username }}</p>
                <a href="{% url 'product_list' %}"
                   class="flex items-center gap-2 text-xs text-gray-400 hover:text-white">
                    <i class="fa-solid fa-arrow-left"></i> Voltar à loja
                </a>
            </div>
        </aside>

        <!-- Conteúdo principal -->
        <main class="ml-64 flex-1 p-8">
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
                        {% if message.tags == 'success' %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
