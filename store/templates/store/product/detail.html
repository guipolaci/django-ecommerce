{% extends "store/base.html" %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}

<div class="bg-white rounded-2xl shadow-lg p-10 max-w-4xl mx-auto">

    <div class="flex flex-col gap-8">

        <!-- Nome do Produto -->
        <div>
            <h1 class="text-4xl font-bold text-gray-900 mb-2">
                {{ product.name }}
            </h1>
            <div class="h-1 w-20 bg-blue-600 rounded"></div>
        </div>

        <!-- Descrição -->
        <div>
            <h3 class="text-lg font-semibold text-gray-800 mb-2">
                Descrição
            </h3>
            <p class="text-gray-600 leading-relaxed">
                {{ product.description }}
            </p>
        </div>

        <!-- Preço -->
        <div>
            <span class="text-3xl font-bold text-green-600">
                R$ {{ product.price }}
            </span>
        </div>

        <!-- Botão -->
        <div>
            <a href="{% url 'add_to_cart' product.id %}"
               class="inline-block bg-green-600 text-white px-8 py-4 text-lg rounded-xl hover:bg-green-700 transition shadow-md hover:shadow-lg">
                🛒 Adicionar ao Carrinho
            </a>
        </div>

    </div>

</div>

{% endblock %}
