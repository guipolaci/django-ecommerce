<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>{% block title %}Ecommerce{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>



<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'product_list' %}" class="text-2xl font-bold text-gray-800">
                MeuEcommerce
            </a>

            <a href="{% url 'cart_detail' %}"
   class="relative text-gray-700 hover:text-blue-600 transition text-2xl">

    <i class="fa-solid fa-cart-shopping"></i>

</a>
        </div>
    </header>

    {% if messages %}
<div class="fixed top-6 right-6 z-50 space-y-2">
    {% for message in messages %}
    <div class="bg-green-600 text-white px-6 py-4 rounded-xl shadow-lg animate-fade-in">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

    <!-- Content -->
    <main class="flex-1 max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white shadow-inner">
        <div class="max-w-6xl mx-auto px-6 py-4 text-center text-gray-500">
            © 2026 MeuEcommerce
        </div>
    </footer>

<script>
    setTimeout(() => {
        const alerts = document.querySelectorAll('.bg-green-600');
        alerts.forEach(alert => {
            alert.style.opacity = '0';
            alert.style.transition = 'opacity 0.5s';
        });
    }, 3000);
</script>

</body>
</html>
