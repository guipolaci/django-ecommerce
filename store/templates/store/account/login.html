{% extends "store/base.html" %}
{% block title %}Entrar — ShopBR{% endblock %}

{% block content %}

<div class="max-w-sm mx-auto">

    <div class="text-center mb-6">
        <span class="text-2xl font-bold text-gray-900">
            Shop<span style="color: var(--brand-orange);">BR</span>
        </span>
    </div>

    <div class="bg-white rounded-lg border border-gray-300 p-6">

        <h1 class="text-xl font-semibold text-gray-900 mb-5">Entrar</h1>

        {% if error %}
        <div class="text-sm px-4 py-3 rounded-md mb-4 flex items-start gap-2"
             style="background: #fff7ed; border: 1px solid #fb923c; color: #9a3412;">
            <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" class="flex flex-col gap-4">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div>
                <label class="block text-sm font-medium text-gray-800 mb-1">Usuário</label>
                <input type="text" name="username" required autofocus
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-800 mb-1">Senha</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            </div>

            <button type="submit" class="btn-primary w-full py-2 text-sm mt-1">
                Continuar
            </button>
        </form>

    </div>

    <div class="flex items-center gap-3 my-5">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="text-xs text-gray-400">Novo na ShopBR?</span>
        <div class="flex-1 border-t border-gray-300"></div>
    </div>

    <a href="{% url 'register' %}"
       class="btn-outline block w-full text-center py-2 text-sm">
        Criar conta
    </a>

</div>

{% endblock %}
